services:
  app:
    build:
      context: .
    image: undiscover-app:latest
    container_name: undiscover-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      SQLITE_DB_PATH: /data/undiscover.db
      UPLOAD_DIR: /data/uploads
      MAX_AUDIO_UPLOAD_MB: ${MAX_AUDIO_UPLOAD_MB:-500}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
      PURGE_DEMO_DATA: ${PURGE_DEMO_DATA:-true}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_NAME: ${ADMIN_NAME:-Undiscover Admin}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://undisc0ver.com}
      AUTH_STATE_SECRET: ${AUTH_STATE_SECRET:-}
      AUDIO_TOKEN_SECRET: ${AUDIO_TOKEN_SECRET:-}
      PAYOUT_ENCRYPTION_SECRET: ${PAYOUT_ENCRYPTION_SECRET:-}
      PAYOUT_MIN_CENTS: ${PAYOUT_MIN_CENTS:-2000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-https://undisc0ver.com/api/auth/google/callback}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_LABEL: ${STRIPE_PRICE_LABEL:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Undisc0ver <noreply@undisc0ver.com>}
      COPYRIGHT_SCAN_PROVIDER: ${COPYRIGHT_SCAN_PROVIDER:-manual}
      COPYRIGHT_TAKEDOWN_EMAIL: ${COPYRIGHT_TAKEDOWN_EMAIL:-copyright@undisc0ver.com}
      COPYRIGHT_BLOCK_THRESHOLD: ${COPYRIGHT_BLOCK_THRESHOLD:-80}
      COPYRIGHT_REVIEW_THRESHOLD: ${COPYRIGHT_REVIEW_THRESHOLD:-45}
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3001/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    volumes:
      - undiscover_data:/data

volumes:
  undiscover_data:
